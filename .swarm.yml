# Provider configuration (optional)
# If not specified, falls back to ANTHROPIC_API_KEY environment variable
# Supported providers: anthropic, openai, openrouter, openclaw, hermes, groq, together, mistral, cohere, perplexity, hyperbolic, gemini, custom
provider:
  type: anthropic
  config:
    apiKey: $ANTHROPIC_API_KEY  # Or use a GitHub secret
    model: claude-3-5-sonnet-latest

# Optional strict worst-case spend cap for all model calls in one action run.
# Calls use fallback_model when the primary model no longer fits; calls are skipped
# before the cap can be exceeded when neither model fits.
# budget:
#   max_cost_usd: 1.50
#   fallback_model: claude-3-5-haiku-latest
#   max_output_tokens: 4096

# Alternative: OpenAI
# provider:
#   type: openai
#   config:
#     apiKey: $OPENAI_API_KEY
#     model: gpt-4o
#     baseURL: https://api.openai.com/v1  # optional, defaults to OpenAI

# Alternative: OpenRouter
# provider:
#   type: openrouter
#   config:
#     apiKey: $OPENROUTER_API_KEY
#     model: anthropic/claude-3.5-sonnet

# Alternative: OpenClaw (via Ollama)
# provider:
#   type: openclaw
#   config:
#     apiKey: $OPENCLAW_GATEWAY_TOKEN
#     model: kimi-k2.5:cloud
#     baseURL: http://localhost:11434/v1

# Alternative: Hermes Agent
# provider:
#   type: hermes
#   config:
#     apiKey: $HERMES_API_KEY
#     model: nous-hermes-3-llama-3.1-405b
#     baseURL: http://localhost:8080/v1

# Alternative: Groq (ultra-low latency)
# provider:
#   type: groq
#   config:
#     apiKey: $GROQ_API_KEY
#     model: llama-3.3-70b-versatile

# Alternative: Together AI (open-source LLMs)
# provider:
#   type: together
#   config:
#     apiKey: $TOGETHER_API_KEY
#     model: meta-llama/Llama-3.3-70B-Instruct-Turbo

# Alternative: Mistral AI (open-weight models)
# provider:
#   type: mistral
#   config:
#     apiKey: $MISTRAL_API_KEY
#     model: mistral-large-latest

# Alternative: Cohere (enterprise-grade models)
# provider:
#   type: cohere
#   config:
#     apiKey: $COHERE_API_KEY
#     model: command-r-plus

# Alternative: Perplexity (search-enhanced models)
# provider:
#   type: perplexity
#   config:
#     apiKey: $PERPLEXITY_API_KEY
#     model: llama-3.1-sonar-small-128k-online

# Alternative: Hyperbolic (cost-optimized inference)
# provider:
#   type: hyperbolic
#   config:
#     apiKey: $HYPERBOLIC_API_KEY
#     model: meta-llama/Llama-3.3-70B-Instruct

# Alternative: Gemini (Google)
# provider:
#   type: gemini
#   config:
#     apiKey: $GEMINI_API_KEY
#     model: gemini-2.0-flash-exp

# Alternative: Custom provider (OpenAI-compatible)
# provider:
#   type: custom
#   config:
#     apiKey: $CUSTOM_API_KEY
#     model: your-model-name
#     baseURL: https://your-provider.com/v1
#     headers:
#       X-Custom-Header: value

agents:
  - name: security
    mandate: >
      Review for security vulnerabilities. Look for injection risks, exposed secrets,
      broken auth, insecure defaults, and unsafe data handling.

  - name: performance
    mandate: >
      Review for performance issues. Look for N+1 queries, unnecessary re-renders,
      expensive operations in hot paths, and missing pagination.

  - name: architecture
    mandate: >
      Review for architectural concerns. Look for separation of concerns violations,
      tight coupling, naming inconsistency, and patterns that do not fit the codebase.

  - name: dx
    mandate: >
      Review for developer experience. Look for missing tests, outdated docs,
      unclear variable names, and changes that will be hard to maintain.

debate:
  rounds: 2
  min_confidence: 0.6

principal:
  mandate: >
    You are the principal engineer. Read the full debate and make final calls.
    Be direct. Show your reasoning. Surface genuine disagreements clearly.

output:
  mode: outcome

diff:
  max_files: 80
  max_patch_chars_per_file: 12000
  max_total_chars: 180000
  exclude_patterns: []

static_analysis:
  enabled: false
  commands: []

context_enrichment:
  enabled: true
  max_depth: 1
  file_size_limit_kb: 100
