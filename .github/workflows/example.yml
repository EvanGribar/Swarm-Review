name: swarm-review-example

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: 20
          cache: npm

      - name: Build action bundle
        run: |
          npm ci
          npm run build

      - name: Skip swarm-review when API key is missing
        if: ${{ secrets.ANTHROPIC_API_KEY == '' }}
        run: echo "Skipping swarm-review-example because ANTHROPIC_API_KEY is not configured."

      - name: Run swarm-review
        if: ${{ secrets.ANTHROPIC_API_KEY != '' }}
        uses: ./
        with:
          github-token: ${{ github.token }}
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          anthropic-model: claude-3-5-sonnet-latest
          config-path: .swarm.yml